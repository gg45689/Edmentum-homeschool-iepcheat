<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edmentum Courseware Executor</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    /* Header */
    .header {
        background: #1e293b;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    /* Main Container */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
        flex-direction: column;
    }

    /* Card */
    .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        text-align: center;
        width: 350px;
    }

    /* Button */
    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
    }

    /* Output box */
    #output {
        margin-top: 20px;
        background: #0f172a;
        padding: 10px;
        border-radius: 6px;
        font-size: 13px;
        word-break: break-all;
    }

    /* Status */
    #status {
        margin-top: 10px;
        font-size: 12px;
        color: #22c55e;
    }
</style>
</head>
<body>

<div class="header">
    Edmentum Courseware Executor
</div>

<div class="container">
    <div class="card">
        <h3>API Key Generator</h3>
        <p>Click below to generate and copy the executor key.</p>

        <button onclick="generateKey()">Copy Edmentum API Key for Executor</button>

        <div id="output">No key generated</div>
        <div id="status"></div>
    </div>
</div>

<script>
function generateKey() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key = "EDM-";

    for (let i = 0; i < 20; i++) {
        key += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("output").innerText = key;

    navigator.clipboard.writeText(key).then(() => {
        document.getElementById("status").innerText = "Copied to clipboard!";
    }).catch(() => {
        document.getElementById("status").innerText = "Copy failed.";
    });
}
</script>

</body>
</html>
